type: optimize_multiplication
desc: An experiment for finding the smallest number that when multiplied by two factors yields a target number

labs:
  - multiplication_lab

tasks:
  - name: mult_1
    type: Multiplication
    parameters:
      number: eos_dynamic
      factor: eos_dynamic
    devices:
      multiplier:
        lab_name: multiplication_lab
        name: multiplier

  - name: mult_2
    type: Multiplication
    dependencies:
      - mult_1
    parameters:
      number: mult_1.product
      factor: eos_dynamic
    devices:
      multiplier:
        lab_name: multiplication_lab
        name: multiplier

  - name: score_multiplication
    type: Score Multiplication
    dependencies:
      - mult_2
    parameters:
      number: mult_1.in_number
      product: mult_2.product
    devices:
      analyzer:
        lab_name: multiplication_lab
        name: analyzer
